name: 💡 Feature request / improvement
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve ailore? Open it here for discussion **before** sending a pull request,
        so we can agree on the approach first.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you imagine it working? CLI flags, config, behavior, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a pull request for this (after it's discussed and approved)
