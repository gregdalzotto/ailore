name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran.
      placeholder: |
        1. ailore index ...
        2. ailore ask "..."
        3. See error
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - ollama
        - openai
        - gemini
        - openrouter
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ailore version
      description: Output of `ailore --version`.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
