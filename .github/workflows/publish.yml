name: Publish to npm

# Publishes to npm whenever a version tag (e.g. v0.1.1) is pushed.
# Can also be triggered manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Gate the release on the same checks as CI.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Publishes with provenance, proving the package was built from this
      # repo + workflow. Requires the NPM_TOKEN repository secret.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
