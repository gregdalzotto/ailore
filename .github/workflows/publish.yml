name: Publish to npm

# Publishes to npm whenever a version tag (e.g. v0.1.1) is pushed.
# Can also be triggered manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
      id-token: write # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Gate the release on the same checks as CI.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Publishes with provenance, proving the package was built from this
      # repo + workflow. Requires the NPM_TOKEN repository secret.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Mirror the release on GitHub: extract the matching CHANGELOG section as
      # the release notes so npm and the Releases tab never drift apart. Tag
      # pushes only — a manual workflow_dispatch on a branch has no version tag.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          # Pull the lines between this version's heading and the next "## [".
          notes="$(awk -v ver="## [$version]" '
            index($0, ver) == 1 { grab = 1; next }
            grab && /^## \[/    { exit }
            grab                { print }
          ' CHANGELOG.md)"
          {
            printf '%s\n\n---\n\n' "${notes:-Release $TAG}"
            printf '📦 npm: https://www.npmjs.com/package/ailore/v/%s\n' "$version"
          } > release-notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi
