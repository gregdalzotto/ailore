name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Security gate — no feature ships over a vulnerable published runtime.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      # Hard gate: fail the build on ANY vulnerability in what users actually
      # install (production dependencies). The published runtime must stay clean.
      - name: Audit published runtime
        run: npm run audit:prod

      # Visibility only: dev/build tooling isn't shipped, so report without
      # blocking (these advisories never reach users).
      - name: Audit all dependencies (report only)
        run: npm audit || true

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
