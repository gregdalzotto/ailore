<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="ailore — local-first semantic search and RAG">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="1196" height="316" rx="22" fill="#0B0E14" stroke="#161B22" stroke-width="2"/>

  <!-- editor gutter: the "path:line" signature, abstracted -->
  <line x1="108" y1="44" x2="108" y2="276" stroke="#161B22" stroke-width="2"/>
  <g fill="#28303F" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21" text-anchor="end">
    <text x="84" y="96">01</text>
    <text x="84" y="140">02</text>
    <text x="84" y="184">03</text>
    <text x="84" y="228">04</text>
  </g>

  <!-- vector-field motif: faint dots, one lit node -->
  <g fill="#1B2330">
    <circle cx="980" cy="74" r="3"/><circle cx="1024" cy="74" r="3"/><circle cx="1068" cy="74" r="3"/><circle cx="1112" cy="74" r="3"/>
    <circle cx="980" cy="110" r="3"/><circle cx="1024" cy="110" r="3"/><circle cx="1112" cy="110" r="3"/>
    <circle cx="980" cy="146" r="3"/><circle cx="1068" cy="146" r="3"/><circle cx="1112" cy="146" r="3"/>
  </g>
  <circle cx="1068" cy="110" r="5" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="142" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="800" letter-spacing="-4" fill="#F0F6FC">ailore</text>

  <!-- terminal caret -->
  <rect x="556" y="90" width="20" height="116" rx="5" fill="url(#accent)"/>

  <!-- gradient underline -->
  <rect x="146" y="210" width="404" height="5" rx="2.5" fill="url(#fade)"/>

  <!-- tagline -->
  <text x="148" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" fill="#8B949E">local-first semantic search &amp; RAG &#183; grounded in your files</text>
</svg>
